<!DOCTYPE html>

    <title>Event Explanation</title>
</head>
<body>

    <!--
    AN event is an action performed by the user
    or browser
    Examples:
    1.Clicking a button
    2.Typing in a textbox
    3.Submitting form
    4.Moving the mouse
    5.Pressing a key
    Js listens to this events and performs
    //common events
    1.clilck-> user clicks an element
    2.submit->form is submited
    3.change->input value changes
    4.keyup ->key is released
    5.keydown->key is pressed
    6.mouseover->mouse enters the element
    7.mouseout->mouse leaves element

    -->
    <h1>Events Explanation </h1>
    <!--Inline event-->
    <button onclick="showMessage()"
    >click me </button>
    <form id="loginForm">
        <input type="text" placeholder="Username"/>
        <button>Submit</button>
