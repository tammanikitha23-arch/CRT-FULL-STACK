<body>
    <h1>Sync & Async</h1>
    <!--
what is synchronous programming?
    ->Js executes one statement at a time in the exact it is written 
    ->the next statement should wait until the current statement executes 

what is asynchronous programming?
    ->Js starts a task and continues executing the remaining code 
    without waiting for that task to finish 
    -->
    <script src="sync.js"></script>
</body>
